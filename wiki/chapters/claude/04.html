    <h1>Claude</h1>
    <h2>4. 핵심 기능 사용법 (입력/출력/제약/실패 패턴)</h2>
    <ul>
      <li><strong>입력:</strong> 배경 문서 + 목표 + 독자 + 금지사항</li>
      <li><strong>출력:</strong> 요약/결론/액션아이템/확인필요 항목 분리</li>
      <li><strong>제약:</strong> 미확인 내용 단정 금지, 검증 필요 문장 태깅</li>
      <li><strong>실패 패턴:</strong> 목표 없이 포괄 요청, 형식 미지정, 검증 단계 생략, 미확인 문장 단정 반영</li>
      <li><strong>운영 게이트:</strong> 최종 반영 전 "반영 가능/보류/직접 확인 필요" 3분류 승인 절차 적용</li>
    </ul>
