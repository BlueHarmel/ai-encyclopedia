    <h1>GitHub Copilot</h1>
    <h2>2. 공식 용어·핵심 개념(초보 기준)</h2>
    <ul>
  <li><strong>Copilot:</strong> 코드 컨텍스트를 바탕으로 제안을 생성하는 보조 기능.</li>
  <li><strong>Quickstart:</strong> 최소 설정으로 제안을 받아보는 입문 절차.</li>
  <li><strong>Changelog:</strong> 기능 가용성과 변경 시점을 확인하는 공식 기록.</li>
  <li><strong>확인 불가/직접 확인 필요:</strong> 플랜별 모델 선택 범위, 조직 정책별 제한.</li>
</ul>
