    <h2>3. 제품 구성요소(모델/앱/API/도구 구분)</h2>
    <ul>
  <li><strong>IDE 통합:</strong> 편집기 안에서 코드 제안/수정 보조.</li>
  <li><strong>GitHub 통합:</strong> PR/리뷰 맥락에서 문서화/검토 보조.</li>
  <li><strong>문서 계층:</strong> Copilot Docs/Quickstart가 기본 기능 기준.</li>
  <li><strong>업데이트 계층:</strong> GitHub Changelog(Copilot 라벨)로 변경 추적.</li>
</ul>
